<!DOCTYPE html>
<html>
<head><title>{{.Name}}</title></head>
<body>
    <h1>Это кот {{.Name}}</h1>
    <ul>
        <li>ID: {{.ID}}</li>
        <li>Имя: {{.Name}}</li>
        <li>Возраст: {{.Age}}</li>
        <li>Бездомный: {{.Homeless}}</li>
        <li>Создан: {{.CreatedAt}}</li>
    </ul>
    <img src={{.CatImage}}>
</body>
</html>
